name: continuous-integration

on: [push, pull_request]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache python dependencies
        id: cache-pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-build-${{ hashFiles('**/requirements.txt', '**/setup.py') }}
          restore-keys:
            pip-${{ matrix.python-version }}-

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install wheel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install ".[pre-commit]"

      - name: Run pre-commit & linter
        run: |
          # pre-commit run --all-files || (git status --short; git diff; exit 1)
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude ./samos/io/xsf.py
      - name: Run tests
        run: |
          cd tests
          python test_dynamics.py;
          python test_trajectory.py
